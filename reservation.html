<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>경주 고옥스테이 담소 - 예약안내</title>
    <meta name="description" content="경주 자연 속 전 객실 독채에서 바베큐와 불멍을 즐기며 프라이빗한 휴식과 여유로운 힐링을 만끽하는 감성 숙소">
    <meta name="keywords" content="경주 펜션, 경주 촌캉스, 경주 감성 펜션, 경주 한옥펜션, 경주 고옥펜션, 경주 커플펜션, 경주 가족 펜션">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/reservation.css">
  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="경주 고옥스테이 담소 - 예약안내" />
  <meta property="og:description" content="경주 자연 속 전 객실 독채에서 바베큐와 불멍을 즐기며 프라이빗한 휴식과 여유로운 힐링을 만끽하는 감성 숙소" />
  <meta property="og:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/15/621Y3DCBqNeh.jpg" />
  <meta property="og:url" content="https://gookstaydamso.co.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="경주 고옥스테이 담소 - 예약안내" />
  <meta name="twitter:description" content="경주 자연 속 전 객실 독채에서 바베큐와 불멍을 즐기며 프라이빗한 휴식과 여유로운 힐링을 만끽하는 감성 숙소" />
  <meta name="twitter:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/15/621Y3DCBqNeh.jpg" />
  <meta name="naver-site-verification" content="d7fdb50f60eec5152d168b7777df675ae11d814e" />
  <meta name="google-site-verification" content="o6aS9-8T3QekkYkCnfu1TP5YGvIBwvqOr4W8Hhaj7OE" />
</head>
<body>

    <!-- Navigation (Header) -->
    <div class="navigation-off">
        <div id="header-container"></div>
    </div>

    <div id="app" class="reservation-container">

        <!-- custom field: 예약안내 Section -->
        <div class="main-section">
            <!-- custom field: 예약안내 이미지 매핑 (슬라이드) — mapper가 동적 생성 -->
            <div class="main-bg" data-hero-slider></div>
            <div class="main-content">
                <!-- custom field: 예약안내 타이틀 매핑-->
                <h1 class="main-title" data-reservation-hero-title></h1>
                <div class="title-divider"><div class="bar-progress"></div></div>
                <!-- custom field: 예약안내 이미지1 설명 매핑-->
                <p class="main-subtitle" data-reservation-hero-description></p>
            </div>
            <div class="main-arrow">
                <div class="arrow-left"></div>
                <p class="arrow-number">01</p>
                <div class="arrow-divider"></div>
                <p class="arrow-number">05</p>
                <div class="arrow-right"></div>
            </div>
        </div>

        <div class="section-con">
            <!-- custom field: 예약안내 이용안내 섹션 이미지 매핑-->
            <div class="side-img-wrapper">
                <div class="img-inner">
                    <img src="" alt="" data-reservation-side-image>
                </div>
            </div>

            <!-- 하드코딩, 매핑 x -->
            <p class="page-title">Reservation</p>

            <div class="tabs-group">
                <!-- 하드코딩 ,매핑 필요 없음 -->
                <a href="#guide-util" class="tab-btn active">
                    <div class="tab-bg"></div>
                    <span class="tab-text">이용 안내</span>
                </a>
                <a href="#guide-fee" class="tab-btn">
                    <div class="tab-bg"></div>
                    <span class="tab-text">취소 수수료</span>
                </a>
            </div>

            <!-- Text Content Area -->
            <div class="text-content-area">

                <!-- 1. 이용 안내 -->
                <div id="guide-util" class="info-section">
                    <div class="section-header">
                         <!-- 하드코딩 ,매핑 필요 없음 -->
                        <p class="section-title">이용 안내</p>
                        <div class="section-line"></div>
                    </div>
                    <!-- 숙소 설정 이용안내 매핑-->
                    <p class="info-list" data-usage-guide></p>
                </div>

                <!-- 5. 취소 수수료 -->
                <div id="guide-fee" class="info-section">
                    <div class="section-header">
                         <!-- 하드코딩 ,매핑 필요 없음 -->
                        <p class="section-title">취소 수수료</p>
                        <div class="section-line"></div>
                    </div>

                    <div class="fee-table-container">
                        <!-- 숙소설정 환불 정책관리 매핑-->
                        <table class="fee-table" data-refund-table></table>
                    </div>
                </div>

            </div>
        </div>

        <!-- 홈/마무리 섹션 그대로 가져옴-->
        <div class="content-4 closing-section">
            <div class="content-4-bg" data-closing-image></div>
            <div class="content-4-text">
                <h2 data-closing-title></h2>
                <p data-closing-description></p>
            </div>
        </div>

        <!-- Footer -->
        <div id="footer-container" class="section-footer"></div>

    </div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/pages/reservation.js"></script>

    <!-- Data Mapper -->
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/reservation-mapper.js"></script>
    <script src="js/preview-handler.js"></script>

    <!-- Header / Footer Loader -->
    <script src="js/header-footer-loader.js"></script>
</body>
</html>
